<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Opening CarX Drift Racing 2...</title>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f8f9fa;
  min-height: 100vh;
  min-height: 100dvh;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.loader {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
.spinner {
  width: 48px;
  height: 48px;
  border: 4px solid #e1e3e4;
  border-top-color: #b70013;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
.loader p {
  color: #5f5e5e;
  font-size: 14px;
}
.error {
  display: none;
  text-align: center;
  padding: 40px;
  max-width: 400px;
}
.error h1 {
  color: #b70013;
  font-size: 24px;
  margin-bottom: 12px;
}
.error p {
  color: #5f5e5e;
  line-height: 1.6;
}
</style>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');

  // ============================================
  // GANTI INI DENGAN URL APPS SCRIPT DEPLOYMENT MU
  // ============================================
  var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxJ9TN4d889oww8a5H3OT9TZ8IobghfVYfb_5LQaFf-om0IWs15K5RSpIMQPwon5JPC5Q/exec';

  if (!id) {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('errorMsg').textContent = 'No QR code ID provided.';
    return;
  }

  // Redirect langsung ke Apps Script dengan ID
  var redirectUrl = APPS_SCRIPT_URL + '?id=' + encodeURIComponent(id);
  window.location.replace(redirectUrl);

  // Fallback: kalau redirect gagal, tampilkan tombol manual
  setTimeout(function() {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('manualLink').href = redirectUrl;
  }, 3000);
})();
</script>
</head>
<body>
<div id="loader" class="loader">
  <div class="spinner"></div>
  <p>Opening CarX Drift Racing 2...</p>
</div>
<div id="error" class="error">
  <h1>Redirect Failed</h1>
  <p id="errorMsg">If the page doesn't open automatically, tap the button below.</p>
  <a id="manualLink" href="#" style="display:inline-block;margin-top:20px;padding:12px 28px;background:#b70013;color:#fff;text-decoration:none;border-radius:10px;font-weight:600;">Open Game</a>
</div>
</body>
</html>
